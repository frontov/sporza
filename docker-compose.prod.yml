services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: sporza-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sporza}
      POSTGRES_USER: ${POSTGRES_USER:-sporza}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sporza} -d ${POSTGRES_DB:-sporza}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: sporza-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: sporza-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:9001:9001"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: sporza-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-sporza}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-sporza}
      REDIS_URL: redis://redis:6379
      IMPORT_QUEUE_NAME: ${IMPORT_QUEUE_NAME:-activity-imports}
      STRAVA_SYNC_QUEUE_NAME: ${STRAVA_SYNC_QUEUE_NAME:-strava-sync}
      S3_ENDPOINT: http://minio:9000
      S3_REGION: ${S3_REGION:-ru-central-1}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET_UPLOADS: ${S3_BUCKET_UPLOADS:-sporza-uploads}
      S3_PUBLIC_BASE_URL: https://sporza.ru/storage/${S3_BUCKET_UPLOADS:-sporza-uploads}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-30d}
      JWT_REFRESH_TTL_DAYS: ${JWT_REFRESH_TTL_DAYS:-30}
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY}
      STRAVA_CLIENT_ID: ${STRAVA_CLIENT_ID}
      STRAVA_CLIENT_SECRET: ${STRAVA_CLIENT_SECRET}
      STRAVA_REDIRECT_URI: https://sporza.ru/profile
      STRAVA_WEBHOOK_CALLBACK_URL: https://sporza.ru/v1/strava/webhook
      STRAVA_WEBHOOK_VERIFY_TOKEN: ${STRAVA_WEBHOOK_VERIFY_TOKEN}
      SPORLY_EVENTS_URL: ${SPORLY_EVENTS_URL:-https://sporly.ru/api/events}
      SPORLY_SYNC_TTL_MINUTES: ${SPORLY_SYNC_TTL_MINUTES:-30}
      SPORLY_PAGE_SIZE: ${SPORLY_PAGE_SIZE:-100}
      CORS_ORIGIN: https://sporza.ru,https://www.sporza.ru

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://sporza.ru}
        NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY}
    container_name: sporza-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: https://sporza.ru
      NEXT_PUBLIC_YANDEX_MAPS_API_KEY: ${NEXT_PUBLIC_YANDEX_MAPS_API_KEY}

  caddy:
    image: caddy:2.9-alpine
    container_name: sporza-caddy
    restart: unless-stopped
    depends_on:
      - web
      - api
      - minio
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  minio_data:
  caddy_data:
  caddy_config:
